name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      # Test RLS chạy trên Supabase project DEV (chỉ khi đã cấu hình secrets)
      - name: RLS isolation tests
        if: ${{ vars.RLS_TESTS_ENABLED == 'true' }}
        run: npm run test:rls
        env:
          SUPABASE_URL: ${{ secrets.DEV_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.DEV_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.DEV_SUPABASE_SERVICE_ROLE_KEY }}

  # Migration tự động: dev → Supabase dev; main → Supabase prod.
  # KHÔNG bao giờ sửa DB thủ công (quy định P1).
  migrate:
    needs: check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push migrations
        if: ${{ vars.MIGRATIONS_ENABLED == 'true' }}
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            supabase link --project-ref "$PROD_PROJECT_REF"
          else
            supabase link --project-ref "$DEV_PROJECT_REF"
          fi
          supabase db push
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ github.ref_name == 'main' && secrets.PROD_DB_PASSWORD || secrets.DEV_DB_PASSWORD }}
          DEV_PROJECT_REF: ${{ secrets.DEV_PROJECT_REF }}
          PROD_PROJECT_REF: ${{ secrets.PROD_PROJECT_REF }}
